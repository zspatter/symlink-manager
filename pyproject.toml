# Minimal project config. Currently only houses the pytest setup; this is the
# natural anchor point for full packaging (entry points, metadata) down the line.
[tool.pytest.ini_options]
# The scripts import each other by top-level module name (e.g. `from deploy
# import ...`), so the scripts/ dir must be importable during test collection.
pythonpath = ["scripts"]
testpaths = ["tests"]

[tool.pyright]
extraPaths = ["scripts"]